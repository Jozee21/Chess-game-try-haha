<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Chess-made-by-Jowzie</title>
        <link rel="stylesheet" href="assets/CSS/styles.css">
    </head>
    <body>
        <h1>Chess Game</h1>
        <h2 id="turnDisplay">Turn: White</h2>
        <div id = "containerChessboardAndNotation">
            <div id ="chessboardcreate">
                <div id="chessboard"></div>
            </div>
            <div id="notationAndAnalysis" class="notation-square">
                <h3>Notation and Analysis</h3>
                <ol id="notationList"></ol>
            </div>
        </div>
        <div class="button-group">
            <button id="restartBtn">Restart Game</button>
            <button id="saveBtn">Save Notation</button>
        </div>
        <script src="assets/javascript/script.js" defer></script>
    </body>
</html>
